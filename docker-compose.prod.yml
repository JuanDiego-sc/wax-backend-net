name: wax

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/wax-backend-net:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__WriteConnection: "Host=postgres;Port=5432;Database=Wax_Write;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      ConnectionStrings__ReadConnection: "Host=postgres;Port=5432;Database=Wax_Read;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Cors__AllowedOrigins__0: "${PUBLIC_FRONTEND_ORIGIN}"
      Cors__AllowedOrigins__1: "${PUBLIC_FRONTEND_ORIGIN_1}"
      Cors__AllowedOrigins__3: "${PUBLIC_FRONTEND_ORIGIN_2}"
      Admin__Email: "${ADMIN_EMAIL}"
      Admin__Password: "${ADMIN_PASSWORD}"
      Cloudinary__CloudName: "${CLOUDINARY_CLOUD_NAME}"
      Cloudinary__ApiKey: "${CLOUDINARY_API_KEY}"
      Cloudinary__ApiSecret: "${CLOUDINARY_API_SECRET}"
      EmailSettings__ApiToken: "${RESEND_API_TOKEN}"
      EmailSettings__From: "${EMAIL_FROM}"
      StripeSettings__SecretKey: "${STRIPE_SECRET_KEY}"
      StripeSettings__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
    ports:
      - "80:8080"
    networks:
      - wax-internal

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wax-internal

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wax-internal

networks:
  wax-internal:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data: