name: wax

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/wax-backend-net:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__WriteConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      ConnectionStrings__ReadConnection:  "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Cors__AllowedOrigins__0: "${PUBLIC_FRONTEND_ORIGIN}"
      Admin__Email: "${ADMIN_EMAIL}"
      Admin__Password: "${ADMIN_PASSWORD}"
      Cloudinary__CloudName: "${CLOUDINARY_CLOUD_NAME}"
      Cloudinary__ApiKey: "${CLOUDINARY_API_KEY}"
      Cloudinary__ApiSecret: "${CLOUDINARY_API_SECRET}"
      EmailSettings__ApiToken: "${RESEND_API_TOKEN}"
      EmailSettings__FromEmail: "${EMAIL_FROM}"
      EmailSettings__FromName: "${EMAIL_FROM_NAME}"
      EmailSettings__BaseUrl: "${PUBLIC_FRONTEND_ORIGIN}"
      StripeSettings__PublishableKey: "${STRIPE_PUBLISHABLE_KEY}"
      StripeSettings__SecretKey: "${STRIPE_SECRET_KEY}"
      StripeSettings__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
    networks:
      - wax-internal
    expose:
      - "8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wax-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wax-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - wax-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  wax-internal:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
