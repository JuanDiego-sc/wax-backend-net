services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: wax-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-write:
    image: postgres:17-alpine
    container_name: wax-postgres-write
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wax
      POSTGRES_PASSWORD: wax_write_secret
      POSTGRES_DB: wax_write
    volumes:
      - pgwrite_data:/var/lib/postgresql/data

  postgres-read:
    image: postgres:17-alpine
    container_name: wax-postgres-read
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: wax
      POSTGRES_PASSWORD: wax_read_secret
      POSTGRES_DB: wax_read
    volumes:
      - pgread_data:/var/lib/postgresql/data

volumes:
  rabbitmq_data:
  pgwrite_data:
  pgread_data: